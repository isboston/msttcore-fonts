name: Build DEB/RPM and update rolling release

on:
  workflow_dispatch:

concurrency:
  group: rolling-release-fonts
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build DEB and RPM
        run: |
          sudo bash build.sh rpm deb

      - name: Remove old archived assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view fonts >/dev/null 2>&1; then
            exit 0
          fi

          while IFS= read -r name; do
            case "$name" in
              20????????-??????-*-ttf-mscorefonts-installer_*.deb|20????????-??????-*-msttcore-fonts-installer-*.noarch.rpm)
                gh release delete-asset fonts "$name" --yes
                ;;
            esac
          done < <(gh release view fonts --json assets --jq '.assets[].name')

      - name: Move rolling release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa fonts -m "Rolling release for ${GITHUB_SHA}" "${GITHUB_SHA}"
          git push origin refs/tags/fonts --force

      - name: Update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fonts
          name: "msttcore-fonts packages"
          body: |
            Rolling release for `${{ github.sha }}`.
          draft: false
          prerelease: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/debbuild/ttf-mscorefonts-installer_*.deb
            dist/rpmbuild/RPMS/noarch/msttcore-fonts-installer-*.noarch.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
