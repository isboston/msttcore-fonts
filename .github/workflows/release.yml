name: Build DEB/RPM and update rolling release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DEB and RPM
        run: |
          sudo bash build.sh rpm deb

      - name: Move rolling release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa fonts -m "Rolling release for ${GITHUB_SHA}" "${GITHUB_SHA}"
          git push origin refs/tags/fonts --force

      - name: Update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fonts
          name: "msttcore-fonts packages"
          overwrite_files: true
          fail_on_unmatched_files: true
          files: |
            dist/debbuild/ttf-mscorefonts-installer_*.deb
            dist/rpmbuild/RPMS/noarch/msttcore-fonts-installer-*.noarch.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
