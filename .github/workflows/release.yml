name: Build DEB/RPM and keep asset history

on:
  workflow_dispatch:

concurrency:
  group: rolling-release-fonts
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: |
          git fetch --force --tags origin

      - name: Build DEB and RPM
        run: |
          sudo bash build.sh rpm deb

      - name: Prepare release metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          archive_previous=false
          previous_commit=
          previous_short=
          archive_stamp=
          archive_prefix=
          archive_dir="${RUNNER_TEMP}/archive-assets-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          if git rev-parse -q --verify refs/tags/fonts >/dev/null; then
            previous_commit="$(git rev-parse refs/tags/fonts^{commit})"
            previous_short="$(git rev-parse --short=7 "${previous_commit}")"

            if [ "${previous_commit}" != "${GITHUB_SHA}" ] && gh release view fonts >/dev/null 2>&1; then
              archive_stamp="$(date -u +%Y%m%d-%H%M%S)"
              archive_prefix="${archive_stamp}-${previous_short}"
              archive_previous=true
            fi
          fi

          {
            echo "archive_previous=${archive_previous}"
            echo "previous_commit=${previous_commit}"
            echo "previous_short=${previous_short}"
            echo "archive_stamp=${archive_stamp}"
            echo "archive_prefix=${archive_prefix}"
            echo "archive_dir=${archive_dir}"
          } >> "${GITHUB_OUTPUT}"

      - name: Download previous rolling release assets
        if: steps.meta.outputs.archive_previous == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf "${{ steps.meta.outputs.archive_dir }}"
          mkdir -p "${{ steps.meta.outputs.archive_dir }}"
          gh release download fonts \
            --dir "${{ steps.meta.outputs.archive_dir }}" \
            --pattern 'ttf-mscorefonts-installer_*.deb' \
            --pattern 'msttcore-fonts-installer-*.noarch.rpm'

      - name: Rename previous assets for archive
        if: steps.meta.outputs.archive_previous == 'true'
        run: |
          set -euo pipefail
          shopt -s nullglob
          for file in "${{ steps.meta.outputs.archive_dir }}"/*; do
            base="$(basename "${file}")"
            mv "${file}" "${{ steps.meta.outputs.archive_dir }}/${{ steps.meta.outputs.archive_prefix }}-${base}"
          done

      - name: Prepare upload file list
        id: files
        run: |
          {
            echo 'release_files<<EOF'
            if [ "${{ steps.meta.outputs.archive_previous }}" = "true" ]; then
              echo "${{ steps.meta.outputs.archive_dir }}/*"
            fi
            echo 'dist/debbuild/ttf-mscorefonts-installer_*.deb'
            echo 'dist/rpmbuild/RPMS/noarch/msttcore-fonts-installer-*.noarch.rpm'
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"

      - name: Move rolling release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa fonts -m "Rolling release for ${GITHUB_SHA}" "${GITHUB_SHA}"
          git push origin refs/tags/fonts --force

      - name: Update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fonts
          name: "msttcore-fonts packages"
          body: |
            Rolling release for `${{ github.sha }}`.
            Older package snapshots are kept in this release with timestamped filenames.
          draft: false
          prerelease: false
          make_latest: "true"
          overwrite_files: true
          fail_on_unmatched_files: true
          files: ${{ steps.files.outputs.release_files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

